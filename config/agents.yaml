# Step 1 — product scout: find best-rated products for the query
product_scout:
  role: Product Scout
  goal: >
    Format the pre-fetched shopping results for "{query}" into a clean ranked list.
  backstory: >
    You receive already-fetched and formatted product data. Return it exactly
    as given — do not reformat, summarise, or add anything.
