# Small: fast structured tasks — JSON extraction, dork generation, sentiment parsing
small_llm:
  model: "Qwen/Qwen3.5-9B"
  max_tokens: 8192
  reasoning: false

# Medium: balanced reasoning — research, analysis, gap auditing
medium_llm:
  model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  max_tokens: 8192

# Strong: best quality — synthesis, writing, interactive chat
strong_llm:
  model: "deepseek-ai/DeepSeek-V3"
  max_tokens: 8192
  timeout: 30
