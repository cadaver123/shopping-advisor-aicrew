community_search:
  search_query_template: '{query} best recommended site:reddit.com OR site:head-fi.org OR site:audiosciencereview.com'
  num_results: 5
  max_urls: 3
  time_filter: "qdr:y2"
  timeout: 15
  max_chars_for_extraction: 12000

shopping_search:
  num_results: 20
  timeout: 15

source_discovery:
  search_query_template: '{product_name} review OR "user review" OR forum OR discussion'
  num_results: 20
  max_urls: 6
  time_filter: "qdr:y2"
  timeout: 15
  permanent_domains:
    - reddit.com
  domain_blocklist:
    # E-commerce — major platforms
    - amazon.com
    - amazon.co.uk
    - amazon.de
    - amazon.fr
    - amazon.es
    - amazon.in
