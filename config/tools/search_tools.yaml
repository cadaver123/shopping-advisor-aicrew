    - target.com
    - ebay.com
    - etsy.com
    - aliexpress.com
    - allegro.pl
    - ceneo.pl
    - morele.net
    - x-kom.pl
    # E-commerce — grey-market / reseller aggregators
    - desertcart.com
    - desertcart.sc
    - desertcart.in
    - ubuy.com
    - ubuy.co.th
    - ubuy.sc
    - ubuy.co.ao
    - ubuy.co.in
    - ubuy.de.com
    - ubuy.com.lb
    - a.ubuy.com.kw
    - u-buy.com.ng
    - shop.app
    - shop.tiktok.com
    - microcenter.com
    - hp.com
